services:
  ubersdr_doppler:
    image: madpsy/ubersdr_doppler:latest
    container_name: doppler
    restart: unless-stopped
    environment:
      # UberSDR WebSocket URL
      UBERSDR_URL: "ws://ubersdr:8080/ws"
      #
      # Password required for write actions in the web UI
      # (add/edit/remove stations, change settings)
      # Generated automatically by install.sh — do not edit manually.
      # Use ./get-password.sh to display the current password.
      # UI_PASSWORD: ""
      #
      # Data directory inside the container (stations.json, settings.json, CSV logs)
      DOPPLER_DATA: "/data"
      #
      # Web UI port (default: 6096)
      # WEB_PORT: "6096"
    networks:
      - sdr-network
    volumes:
      - ./doppler_data:/data
    logging:
      driver: "fluentd"
      options:
        fluentd-address: "127.0.0.1:24224"
        fluentd-async: "true"
        tag: "doppler"

networks:
  sdr-network:
    external: true
    name: ubersdr_sdr-network
